name: Collect Listings
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 15 * * *' # 매일 0시 KST = 15:00 UTC
  workflow_dispatch: {}
jobs:
  collect:
    runs-on: ubuntu-latest
    # bot이 push한 커밋이면 스킵 (무한 루프 방지)
    if: "!contains(github.event.head_commit.message, 'chore: update listings data')"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run collect
      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/listings.json
          git diff --staged --quiet || git commit -m "chore: update listings data $(date +%Y-%m-%d)"
          git push
